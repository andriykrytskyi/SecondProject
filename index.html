<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Rally Game</title>
<style>
    body {
        margin: 0;
        background: #333;
        overflow: hidden;
        font-family: Arial, sans-serif;
    }

    #game {
        width: 400px;
        height: 600px;
        background: #555;
        margin: 20px auto;
        position: relative;
        overflow: hidden;
        border: 4px solid white;
    }

    .road-line {
        width: 10px;
        height: 80px;
        background: white;
        position: absolute;
        left: 195px;
    }

    #player {
        width: 50px;
        height: 80px;
        background: red;
        position: absolute;
        bottom: 20px;
        left: 175px;
        border-radius: 10px;
    }

    .enemy {
        width: 50px;
        height: 80px;
        background: yellow;
        position: absolute;
        top: -100px;
        border-radius: 10px;
    }

    #score {
        color: white;
        text-align: center;
        font-size: 20px;
    }
</style>
</head>
<body>

<div id="score">Score: 0</div>
<div id="game">
    <div id="player"></div>
</div>

<script>
const game = document.getElementById("game");
const player = document.getElementById("player");
const scoreDisplay = document.getElementById("score");

let playerX = 175;
let score = 0;
let speed = 5;
let enemies = [];

document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft" && playerX > 0) {
        playerX -= 25;
    }
    if (e.key === "ArrowRight" && playerX < 350) {
        playerX += 25;
    }
    player.style.left = playerX + "px";
});

function createEnemy() {
    const enemy = document.createElement("div");
    enemy.classList.add("enemy");
    enemy.style.left = Math.floor(Math.random() * 350) + "px";
    game.appendChild(enemy);
    enemies.push(enemy);
}

function moveEnemies() {
    enemies.forEach((enemy, index) => {
        let top = parseInt(enemy.style.top || -100);
        enemy.style.top = top + speed + "px";

        if (top > 600) {
            enemy.remove();
            enemies.splice(index, 1);
            score++;
            scoreDisplay.textContent = "Score: " + score;
        }

        // Collision
        if (
            top + 80 > 520 &&
            parseInt(enemy.style.left) < playerX + 50 &&
            parseInt(enemy.style.left) + 50 > playerX
        ) {
            alert("Game Over! Your score: " + score);
            location.reload();
        }
    });
}

function gameLoop() {
    moveEnemies();
    requestAnimationFrame(gameLoop);
}

setInterval(createEnemy, 1500);
gameLoop();
</script>

</body>
</html>
